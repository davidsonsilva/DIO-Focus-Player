name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages.yml"
      - "index.html"
      - "privacy.html"
      - "site/**"
      - "assets/**"
      - "imagens/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site artifact
        shell: bash
        run: |
          mkdir -p _site/imagens/screenshots/1280x800
          cp index.html privacy.html _site/
          cp -R site assets _site/
          cp imagens/screenshots/1280x800/Tela-0{1,2,3,4}-1280x800.png \
            _site/imagens/screenshots/1280x800/
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
